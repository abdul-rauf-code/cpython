name: Build Python PDF Documentation

on:
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Minimal System Dependencies
        run: |
          sudo apt-get update
          # Just installing basic components since the tutorial doesn't use complex SVGs
          sudo apt-get install -y texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended latexmk

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install blurb sphinx

      - name: Build Only the Tutorial Booklet
        run: |
          # Force Sphinx to strictly target the tutorial directory
          sphinx-build -b latex Doc Doc/build/latex Doc/tutorial/*.rst
          
          # Compile the tutorial booklet cleanly
          make -C Doc/build/latex

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-tutorial-pdf
          path: Doc/build/latex/*.pdf
          
