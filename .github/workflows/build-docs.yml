name: Build Python PDF Documentation

on:
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra texlive-xetex latexmk make

    - name: Build PDF Docs
      run: |
        cd Doc
        make venv
        make latex
        cd build/latex
        make
      continue-on-error: true

    - name: Upload PDF Artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-pdf-docs
        path: Doc/build/latex/*.pdf
        
