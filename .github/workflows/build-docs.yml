name: Build Python PDF Documentation

on:
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended latexmk

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install blurb sphinx

      - name: Build Only the Tutorial Booklet Natively
        run: |
          # 1. Generate the raw files for the documentation structure
          sphinx-build -b latex Doc Doc/build/latex
          
          # 2. Run latexmk directly on the target tutorial file, completely ignoring the global Makefile
          cd Doc/build/latex && latexmk -pdf -interaction=nonstopmode tutorial.tex

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-tutorial-pdf
          path: Doc/build/latex/tutorial.pdf
          
