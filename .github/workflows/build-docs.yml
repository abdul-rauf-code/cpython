name: Build Python PDF Documentation

on:
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra texlive-xetex latexmk fonts-freefont-ttf

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install blurb sphinx

      - name: Build LaTeX Files Directly
        run: |
          # Bypass the strict Makefile and compile cleanly without -W
          sphinx-build -b latex Doc Doc/build/latex

      - name: Compile PDF Documents
        run: |
          # Step into the generated directory and build the final PDFs
          make -C Doc/build/latex

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpython-pdf-manual
          path: Doc/build/latex/*.pdf
          
